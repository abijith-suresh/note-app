name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verification
        run: bun run verify

      - name: Build app
        run: bun run build
